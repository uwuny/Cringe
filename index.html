<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Статистика</title>

<style>

body{
background:#000;
color:#fff;
margin:0;
font-family:Arial;
}

.page{
padding-top:20px;
}

/* заголовок */

.matrix-title{
text-align:center;
font-size:60px;
color:#00ff66;
text-shadow:0 0 20px #00ff66;
}

/* кнопки */

.buttons,.date-buttons{
text-align:center;
}

button{
background:#2b2b2b;
color:#fff;
border:1px solid #444;
padding:6px 12px;
margin:4px;
border-radius:6px;
cursor:pointer;
}

button.active{background:#4a6ed1;}
.date-buttons button.active{background:#00aa55;}

/* танки */

.alive{
color:#00ff66;
font-weight:bold;
}

.dead{
color:#ff4444;
font-weight:bold;
}

/* таблица */

#tableWrapper{
width:100%;
overflow-x:auto;
}

table{
border-collapse:collapse;
background:#1a1a1a;
}

td,th{
border:1px solid #444;
padding:6px;
text-align:center;
white-space:nowrap;
}

/* hover строка */

tr:hover td{
background:#2a2a2a;
}

/* hover колонка */

td.hover-col{
background:#333;
}

.win{background:#2e5e2e;}
.lose{background:#5e2e2e;}

/* закреп ник */

.nick{
position:sticky;
left:0;
background:#111;
z-index:3;
font-weight:bold;
}

</style>
</head>

<body>

<div class="page">

<h1 class="matrix-title">СТАТИСТИКА</h1>

<div class="buttons">
<button class="mode" onclick="loadTable('damage',event)">Урон</button>
<button class="mode" onclick="loadTable('damage_received',event)">Получено</button>
<button class="mode" onclick="loadTable('hits',event)">Попадания</button>
<button class="mode" onclick="loadTable('assist',event)">Ассист</button>
<button onclick="toggleAverage()">Среднее</button>
</div>

<div class="date-buttons" id="dateButtons"></div>

<div id="tableWrapper">
<div id="table"></div>
</div>

</div>

<script src="tables.js"></script>

</body>
</html>
