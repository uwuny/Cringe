<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>Статистика боёв</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<style>

/* --- БАЗА --- */

body{
background:#000;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:0;
overflow-x:hidden;
}

/* --- MATRIX --- */

#matrixCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
opacity:0.35;
}

/* --- PAGE --- */

.page{
position:relative;
z-index:1;
padding-top:20px;
}

/* --- HEADER --- */

.matrix-title{
text-align:center;
font-family:monospace;
font-size:64px;
color:#00ff66;
margin:20px 0 10px 0;
letter-spacing:6px;

text-shadow:
0 0 5px #00ff66,
0 0 15px #00ff66,
0 0 30px #00ff66;
}

/* --- BUTTON AREA WITH IMAGES --- */

.buttons-area{
display:flex;
align-items:center;
justify-content:space-between;
max-width:1100px;
margin:0 auto 10px auto;
padding:0 20px;
}

.side-img{
width:150px;
height:auto;
}

/* --- BUTTONS --- */

.buttons{
text-align:center;
flex-grow:1;
}

button{
background:#2b2b2b;
color:white;
border:1px solid #444;
padding:6px 12px;
margin:4px;
border-radius:6px;
font-size:14px;
cursor:pointer;
transition:0.15s;
}

button:hover{
background:#3a3a3a;
border-color:#666;
}

button.active{
background:#4a6ed1;
border-color:#6f8fff;
}

/* --- TABLE --- */

#tableWrapper{
display:flex;
justify-content:center;
overflow-x:auto;
padding-bottom:10px;
}

table{
border-collapse:collapse;
margin-top:10px;
background:#1a1a1a;
box-shadow:0 0 20px rgba(0,255,100,0.1);
}

td,th{
border:1px solid #444;
padding:4px 6px;
text-align:center;
background:#1e1e1e;
}

th{
background:#262626;
line-height:1.1;
}

tr:hover td{
background:#2a2a2a;
}

tr:hover td:first-child{
background:#333;
}

td:first-child{
font-family:Bahnschrift,Arial,sans-serif;
font-weight:bold;
position:sticky;
left:0;
z-index:3;
background:#1e1e1e;
}

th:first-child{
position:sticky;
left:0;
z-index:4;
background:#262626;
}

.win{background:#2e5e2e;}
.lose{background:#5e2e2e;}
.alive{color:#6bd16b;}
.dead{color:#d16b6b;}

/* --- CREDITS --- */

.credits{
text-align:center;
margin-top:25px;
font-size:13px;
color:#777;
}

.credits img{
display:block;
margin:2px auto 0 auto;
width:750px;
max-width:95%;
height:auto;
}

</style>

</head>

<body>

<canvas id="matrixCanvas"></canvas>

<div class="page">

<h1 class="matrix-title">СТАТИСТИКА</h1>

<!-- КНОПКИ + КАРТИНКИ -->

<div class="buttons-area">

<img src="left_image.png" class="side-img">

<div class="buttons">
<button class="mode" onclick="loadTable('damage',event)">Урон</button>
<button class="mode" onclick="loadTable('damage_received',event)">Получено</button>
<button class="mode" onclick="loadTable('hits',event)">Попадания</button>
<button class="mode" onclick="loadTable('assist',event)">Ассист</button>
<button onclick="toggleAverage()">Среднее слева / справа</button>
</div>

<img src="right_image.png" class="side-img">

</div>

<!-- ТАБЛИЦА -->

<div id="tableWrapper">
<div id="table"></div>
</div>

<!-- НИЖНИЙ БЛОК -->

<div class="credits">
<div>Created by McQueen</div>
<img src="Down.png">
</div>

</div>

<script src="tables.js"></script>

<script>

/* MATRIX EFFECT */

const canvas=document.getElementById("matrixCanvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const letters="アカサタナハマヤラワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"
const chars=letters.split("")

const fontSize=14
const columns=canvas.width/fontSize

const drops=[]

for(let i=0;i<columns;i++){
drops[i]=1
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ff66"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

const text=chars[Math.floor(Math.random()*chars.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0
}

drops[i]++

}

}

setInterval(draw,40)

</script>

</body>
</html>
