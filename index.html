<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Статистика</title>

<style>

body{
  background:#000;
  color:white;
  margin:0;
  font-family:Arial;
  overflow-x:auto;
}

.page{
  position:relative;
  z-index:1;
  padding-top:20px;
}

.matrix-title{
  text-align:center;
  font-size:60px;
  color:#00ff66;
  text-shadow:0 0 20px #00ff66;
}

.buttons,.date-buttons{
  text-align:center;
}

button{
  background:#2b2b2b;
  color:#fff;
  border:1px solid #444;
  padding:6px 12px;
  margin:4px;
  border-radius:6px;
  cursor:pointer;
}

button.active{background:#4a6ed1;}
.date-buttons button.active{background:#00aa55;}


/* цвет танков */

.alive{
  color:#00ff66;
  font-weight:bold;
}

.dead{
  color:#ff4444;
  font-weight:bold;
}


/* таблица */

#tableWrapper{
  overflow-x:auto;
  width:100%;
  margin-top:10px;
}

table{
  border-collapse:collapse;
  background:#1a1a1a;
}

td,th{
  border:1px solid #444;
  padding:6px;
  text-align:center;
  white-space:nowrap;
}

/* hover подсветка */

td:hover{
  background:#333;
}

tr:hover td{
  background:#262626;
}

.win{background:#2e5e2e;}
.lose{background:#5e2e2e;}


/* фикс ник */

.nick{
  position:sticky;
  left:0;
  background:#111;
  z-index:2;
  font-weight:bold;
}


/* картинки */

.side-layer{
  position:absolute;
  top:5px;
  left:50%;
  transform:translateX(-50%);
  width:1000px;
  pointer-events:none;
  z-index:2;
}

.side-img{
  position:absolute;
  width:200px;
}

.side-left{ left:-220px; }
.side-right{ right:-220px; }


.footer{
  text-align:center;
  margin-top:40px;
  position:relative;
}

.video-area{
  position:relative;
  margin-top:20px;
}

.video-center{
  width:500px;
  display:block;
  margin:0 auto;
}

.video-left{
  position:absolute;
  left:20px;
  top:0;
  width:500px;
}

</style>
</head>

<body>

<div class="page">

<div class="side-layer">
  <img src="left_image.png" class="side-img side-left">
  <img src="right_image.png" class="side-img side-right">
</div>

<h1 class="matrix-title">СТАТИСТИКА</h1>


<div class="buttons">
  <button class="mode" onclick="loadTable('damage',event)">Урон</button>
  <button class="mode" onclick="loadTable('damage_received',event)">Получено</button>
  <button class="mode" onclick="loadTable('hits',event)">Попадания</button>
  <button class="mode" onclick="loadTable('assist',event)">Ассист</button>
  <button onclick="toggleAverage()">Среднее</button>
</div>


<div class="date-buttons" id="dateButtons"></div>


<div id="tableWrapper">
  <div id="table"></div>
</div>


<div class="footer">

<div class="video-area">

<video class="video-left" autoplay muted loop playsinline>
<source src="Down.webm" type="video/webm">
</video>

<video class="video-center" autoplay muted loop playsinline>
<source src="Left.mp4" type="video/mp4">
</video>

</div>

</div>

</div>

<script src="tables.js"></script>

</body>
</html>
