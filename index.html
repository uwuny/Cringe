<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Статистика боёв</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">

<style>

body{
background:#1e1e1e;
color:white;
font-family:Arial;
margin:0;
padding:0;
}

#table{
overflow-x:auto;
}

table{
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #444;
padding:4px 6px;
text-align:center;
}

th{
background:#262626;
line-height:1.1;
}

tr:hover td{
background:#2a2a2a;
}

tr:hover td:first-child{
background:#333;
}

td:first-child{
font-family: Bahnschrift, Arial, sans-serif;
font-weight:bold;

position:sticky;
left:0;
z-index:2;
background:#1e1e1e;
}

th:first-child{
position:sticky;
left:0;
z-index:3;
background:#262626;
}

.win{
background:#2e5e2e;
}

.lose{
background:#5e2e2e;
}

.alive{
color:#6bd16b;
}

.dead{
color:#d16b6b;
}

button{
background:#2b2b2b;
color:white;
border:1px solid #444;
padding:6px 12px;
margin:4px;
border-radius:6px;
font-size:14px;
cursor:pointer;
transition:0.15s;
}

button:hover{
background:#3a3a3a;
border-color:#666;
}

button.active{
background:#4a6ed1;
border-color:#6f8fff;
}
.matrix-header{
position:relative;
display:flex;
justify-content:center;
align-items:center;
height:120px;
overflow:hidden;
margin-bottom:10px;
}

.matrix-text{
color:#00ff66;
font-size:56px;
font-family:monospace;
position:relative;
text-shadow:0 0 10px #0f0,0 0 20px #0f0,0 0 40px #0f0;
z-index:2;
letter-spacing:4px;
}

.matrix-text::before{
content:attr(data-text);
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
animation:glitch 2s infinite;
clip-path:polygon(0 0,100% 0,100% 45%,0 45%);
transform:translate(-2px,-2px);
color:#00ff66;
text-shadow:0 0 5px #0f0,0 0 15px #0f0;
}

.rain{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
0deg,
rgba(0,255,0,0.1) 0,
rgba(0,255,0,0.2) 2px,
transparent 4px
);
animation:rain 10s linear infinite;
z-index:1;
}

@keyframes rain{
0%{transform:translateY(-100%)}
100%{transform:translateY(100%)}
}

@keyframes glitch{
0%,100%{
clip-path:polygon(0 0,100% 0,100% 45%,0 45%);
transform:translate(0);
}
33%{
clip-path:polygon(0 0,100% 0,100% 15%,0 15%);
transform:translate(-5px,-5px);
}
66%{
clip-path:polygon(0 85%,100% 85%,100% 100%,0 100%);
transform:translate(5px,5px);
}
}
</style>

</head>

<body>

<div class="matrix-header">
  <h1 class="matrix-text" data-text="СТАТИСТИКА">СТАТИСТИКА</h1>
  <div class="rain"></div>
</div>

<button class="mode" onclick="loadTable('damage',event)">Урон</button>
<button class="mode" onclick="loadTable('damage_received',event)">Получено</button>
<button class="mode" onclick="loadTable('hits',event)">Попадания</button>
<button class="mode" onclick="loadTable('assist',event)">Ассист</button>

<button onclick="toggleAverage()">Среднее слева / справа</button>

<div id="table"></div>

<script src="tables.js"></script>

</body>
</html>
