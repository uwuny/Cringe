<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Статистика боёв</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<style>
body{
  background:#000;
  color:white;
  font-family:Arial,sans-serif;
  margin:0;
  padding:0;
  overflow-x:hidden;
}

#matrixCanvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
  opacity:0.35;
}

.page{
  position:relative;
  z-index:1;
  padding-top:20px;
}

/* Боковые элементы */
.side-layer{
  position:absolute;
  top:5px;
  left:50%;
  transform:translateX(-50%);
  width:1000px;
  pointer-events:none;
  z-index:2;
}

/* Правая картинка */
.side-img{
  position:absolute;
  width:204px;
  height:auto;
}

.side-right{ right:-220px; }

/* Левое видео вместо картинки */
.side-video {
  position:absolute;
  width:204px;
  height:auto;
  pointer-events:none;
  top:0;
  filter: drop-shadow(0 0 10px #00ff66);
}

.side-left {
  left:-220px;
  transform:none;
}

/* Заголовок */
.matrix-title{
  text-align:center;
  font-family:monospace;
  font-size:64px;
  color:#00ff66;
  margin:20px 0 10px 0;
  letter-spacing:6px;
  text-shadow:0 0 5px #00ff66,0 0 15px #00ff66,0 0 30px #00ff66;
}

/* Кнопки */
.buttons{text-align:center;margin-bottom:10px;}
button{
  background:#2b2b2b;
  color:white;
  border:1px solid #444;
  padding:6px 12px;
  margin:4px;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
  transition:0.15s;
}
button:hover{background:#3a3a3a;border-color:#666;}
button.active{background:#4a6ed1;border-color:#6f8fff;}

/* Таблица */
#tableWrapper{display:flex;justify-content:center;overflow-x:auto;}
table{
  border-collapse:collapse;
  margin-top:10px;
  background:#1a1a1a;
  box-shadow:0 0 20px rgba(0,255,100,0.1);
}
td, th{border:1px solid #444;padding:4px 6px;text-align:center;background:#1e1e1e;}
th{background:#262626;}
tr:hover td{background:#2a2a2a;}
td:first-child{font-weight:bold;position:sticky;left:0;z-index:3;background:#1e1e1e;}
th:first-child{position:sticky;left:0;z-index:4;background:#262626;}
.win{background:#2e5e2e;}
.lose{background:#5e2e2e;}
.alive{color:#6bd16b;}
.dead{color:#d16b6b;}

/* Footer */
.footer{
  margin-top:40px;
  padding:15px 0 0 0;
  text-align:center;
  font-size:13px;
  color:#777;
  border-top:1px solid #333;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* Текст футера неоновый */
.credit-text {
  color: #00ff66;
  font-weight: bold;
  font-family: monospace;
  font-size: 14px;
  text-shadow:
     0 0 3px #00ff66,
     0 0 10px #00ff66,
     0 0 20px #00ff66;
  margin-bottom: 8px;
}

/* Видео футера */
.credit-video {
  width: 400px;
  height: auto;
  display: block;
  margin: 0 auto;
  pointer-events: none;
  filter: drop-shadow(0 0 15px #00ff66);
}
</style>
</head>

<body>

<canvas id="matrixCanvas"></canvas>

<div class="page">

  <!-- Боковые элементы -->
  <div class="side-layer">
    <!-- Левое видео вместо картинки -->
    <video class="side-video side-left" autoplay muted loop playsinline>
      <source src="Down.webm" type="video/webm">
    </video>

    <!-- Правая картинка оставляем -->
    <img src="right_image.png" class="side-img side-right">
  </div>

  <h1 class="matrix-title">СТАТИСТИКА</h1>

  <div class="buttons">
    <button class="mode" onclick="loadTable('damage',event)">Урон</button>
    <button class="mode" onclick="loadTable('damage_received',event)">Получено</button>
    <button class="mode" onclick="loadTable('hits',event)">Попадания</button>
    <button class="mode" onclick="loadTable('assist',event)">Ассист</button>
    <button onclick="toggleAverage()">Среднее слева / справа</button>
  </div>

  <div id="tableWrapper">
    <div id="table"></div>
  </div>

  <!-- Футер -->
  <footer class="footer">
    <div class="credit-text">Created by McQueen</div>

    <video class="credit-video" autoplay muted loop playsinline>
      <source src="Down.webm" type="video/webm">
    </video>
  </footer>

</div>

<script src="tables.js"></script>

<script>
/* MATRIX EFFECT */
const canvas=document.getElementById("matrixCanvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const letters="アカサタナハマヤラワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"
const chars=letters.split("")

const fontSize=14
const columns=canvas.width/fontSize
const drops=[]

for(let i=0;i<columns;i++){drops[i]=1}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ff66"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){
const text=chars[Math.floor(Math.random()*chars.length)]
ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){drops[i]=0}
drops[i]++
}
}

setInterval(draw,40)
</script>

</body>
</html>
