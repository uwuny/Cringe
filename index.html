<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Статистика боёв</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
margin:0;
padding:0;
}

/* MATRIX HEADER */

.matrix-header{
position:relative;
height:150px;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

#matrixCanvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
opacity:0.35;
}

.matrix-title{
position:relative;
z-index:2;
font-family:monospace;
font-size:56px;
color:#00ff66;
letter-spacing:6px;
text-shadow:
0 0 5px #00ff66,
0 0 15px #00ff66,
0 0 35px #00ff66;
}

.glitch{
position:relative;
}

.glitch::before,
.glitch::after{
content:attr(data-text);
position:absolute;
left:0;
top:0;
width:100%;
opacity:0.7;
}

.glitch::before{
animation:glitch1 4s infinite linear alternate-reverse;
}

.glitch::after{
animation:glitch2 3s infinite linear alternate-reverse;
}

@keyframes glitch1{
0%{transform:translate(0)}
20%{transform:translate(-2px,2px)}
40%{transform:translate(-3px,-1px)}
60%{transform:translate(2px,1px)}
80%{transform:translate(-1px,-2px)}
100%{transform:translate(0)}
}

@keyframes glitch2{
0%{transform:translate(0)}
25%{transform:translate(2px,-2px)}
50%{transform:translate(-1px,2px)}
75%{transform:translate(1px,-1px)}
100%{transform:translate(0)}
}

/* TABLE */

#table{
overflow-x:auto;
}

table{
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #444;
padding:4px 6px;
text-align:center;
}

th{
background:#262626;
line-height:1.1;
}

tr:hover td{
background:#2a2a2a;
}

tr:hover td:first-child{
background:#333;
}

td:first-child{
font-family: Bahnschrift, Arial, sans-serif;
font-weight:bold;
position:sticky;
left:0;
z-index:2;
background:#1e1e1e;
}

th:first-child{
position:sticky;
left:0;
z-index:3;
background:#262626;
}

.win{
background:#2e5e2e;
}

.lose{
background:#5e2e2e;
}

.alive{
color:#6bd16b;
}

.dead{
color:#d16b6b;
}

/* BUTTONS */

button{
background:#2b2b2b;
color:white;
border:1px solid #444;
padding:6px 12px;
margin:4px;
border-radius:6px;
font-size:14px;
cursor:pointer;
transition:0.15s;
}

button:hover{
background:#3a3a3a;
border-color:#666;
}

button.active{
background:#4a6ed1;
border-color:#6f8fff;
}

/* FOOTER */

.footer{
margin-top:40px;
padding:15px;
text-align:center;
font-size:13px;
color:#777;
border-top:1px solid #333;
}

</style>

</head>

<body>

<div class="matrix-header">

<canvas id="matrixCanvas"></canvas>

<h1 class="matrix-title">
<span class="glitch" data-text="СТАТИСТИКА">СТАТИСТИКА</span>
</h1>

</div>

<div style="padding-left:10px">

<button class="mode" onclick="loadTable('damage',event)">Урон</button>
<button class="mode" onclick="loadTable('damage_received',event)">Получено</button>
<button class="mode" onclick="loadTable('hits',event)">Попадания</button>
<button class="mode" onclick="loadTable('assist',event)">Ассист</button>

<button onclick="toggleAverage()">Среднее слева / справа</button>

</div>

<div id="table"></div>

<footer class="footer">
Created by McQueen
</footer>

<script src="tables.js"></script>

<script>

const canvas = document.getElementById("matrixCanvas")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = 150

const letters = "アカサタナハマヤラワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"
const chars = letters.split("")

const fontSize = 14
const columns = canvas.width / fontSize

const drops = []

for(let i=0;i<columns;i++){
drops[i]=1
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ff66"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

const text = chars[Math.floor(Math.random()*chars.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0
}

drops[i]++

}

}

setInterval(draw,40)

</script>

</body>
</html>
