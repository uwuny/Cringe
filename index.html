<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Статистика</title>

<style>
body{
  background:#000;
  color:white;
  margin:0;
  font-family:Arial;
  overflow-x:auto;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

.page{
  position:relative;
  z-index:1;
  padding-top:10px;
}

.matrix-title{
  text-align:center;
  font-size:60px;
  color:#00ff66;
  text-shadow:0 0 20px #00ff66;
  margin-bottom:5px;
}

.buttons{
  text-align:center;
  margin-bottom:10px;
}

.date-buttons{
  text-align:center;
  margin-bottom:10px;
}

button{
  background:#2b2b2b;
  color:#fff;
  border:1px solid #444;
  padding:6px 12px;
  margin:4px;
  border-radius:6px;
  cursor:pointer;
}

button.active{background:#4a6ed1;}
.date-buttons button.active{background:#00aa55;}

#tableWrapper{
  width:100%;
  overflow-x:auto;
}

table{
  border-collapse:collapse;
  background:#1a1a1a;
  width:max-content;
  min-width:100%;
  table-layout:fixed;
}

th, td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
  transition:0.15s;
}

th:first-child, td:first-child{
  width:180px;
  min-width:180px;
  max-width:180px;

  /* закреп первой колонки */
  position:sticky;
  left:0;
  background:#1a1a1a;
  z-index:2;
}

/* hover */
tr.hover-row td{
  background: rgba(255,255,255,0.05);
}

td.hover-col, th.hover-col{
  background: rgba(255,255,255,0.05);
}

td.hover-cell{
  background: rgba(255,255,255,0.12);
}

.win{background:#2e5e2e;}
.lose{background:#5e2e2e;}

.alive{color:#00ff66; font-weight:bold;}
.dead{color:#ff4444; font-weight:bold;}

/* кликабельные ники */
.player-name{
  cursor:pointer;
  color:#4aa3ff;
}

.player-name:hover{
  text-decoration:underline;
}

/* график */
#chart{
  width:90%;
  margin:30px auto;
  display:block;
  background:#111;
  border:1px solid #333;
  border-radius:10px;
  padding:10px;
}

.bottom-line{
  width:90%;
  height:1px;
  background:#00ff66;
  margin:40px auto 10px auto;
  box-shadow:0 0 8px #00ff66;
}

.footer-text{
  text-align:center;
  color:rgba(255,255,255,0.9);
  font-size:14px;
  margin-bottom:20px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="page">

<h1 class="matrix-title">СТАТИСТИКА</h1>

<div class="buttons">
  <button class="mode" onclick="loadTable('damage',event)">Урон</button>
  <button class="mode" onclick="loadTable('damage_received',event)">Получено</button>
  <button class="mode" onclick="loadTable('hits',event)">Попадания</button>
  <button class="mode" onclick="loadTable('assist',event)">Ассист</button>
  <button onclick="toggleAverage()">Среднее</button>
</div>

<div class="date-buttons" id="dateButtons"></div>

<div id="tableWrapper">
  <div id="table"></div>
</div>

<!-- 🔥 ГРАФИК -->
<canvas id="chart" height="100"></canvas>

<div class="bottom-line"></div>
<div class="footer-text">Created by McQueen</div>

</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ТВОЙ JS -->
<script src="tables.js"></script>

<!-- MATRIX ЭФФЕКТ -->
<script>
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

const chars="アイウエオ1234567890".split("");
const fontSize=16;
let columns;
let drops;

function initMatrix(){
  columns=Math.floor(canvas.width/fontSize);
  drops=Array(columns).fill(1);
}

initMatrix();

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.1)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#00ff66";
  ctx.font=fontSize+"px monospace";

  drops.forEach((y,i)=>{
    let text=chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(text,i*fontSize,y*fontSize);

    if(y*fontSize>canvas.height && Math.random()>0.97){
      drops[i]=0;
    }

    drops[i]++;
  });
}

setInterval(draw,40);
</script>

</body>
</html>
