<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Статистика</title>

<style>
body{
  background:#000;
  color:white;
  margin:0;
  font-family:Arial;
  overflow-x:auto;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

.page{
  position:relative;
  z-index:1;
  padding-top:10px;
}

.matrix-title{
  text-align:center;
  font-size:60px;
  color:#00ff66;
  text-shadow:0 0 20px #00ff66;
  margin-bottom:5px;
}

/* ТАБЫ */
.main-tabs{
  text-align:center;
  margin-bottom:10px;
}

.main-tabs button.active{
  background:#00aa55;
}

.buttons{
  text-align:center;
  margin-bottom:10px;
}

.date-buttons{
  text-align:center;
  margin-bottom:10px;
}

button{
  background:#2b2b2b;
  color:#fff;
  border:1px solid #444;
  padding:6px 12px;
  margin:4px;
  border-radius:6px;
  cursor:pointer;
}

button.active{background:#4a6ed1;}
.date-buttons button.active{background:#00aa55;}

#tableWrapper{
  width:100%;
  overflow-x:auto;
}

table{
  border-collapse:collapse;
  background:#1a1a1a;
  width:max-content;
  min-width:100%;
  table-layout:fixed;
}

th, td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
}

th:first-child, td:first-child{
  width:180px;
}

/* hover */
tr.hover-row td{
  background: rgba(255,255,255,0.05);
}

td.hover-col, th.hover-col{
  background: rgba(255,255,255,0.05);
}

td.hover-cell{
  background: rgba(255,255,255,0.12);
}

.win{background:#2e5e2e;}
.lose{background:#5e2e2e;}

.alive{color:#00ff66; font-weight:bold;}
.dead{color:#ff4444; font-weight:bold;}

/* ОБОРУДОВАНИЕ */
.equip-buttons{
  margin-top:20px;
  text-align:center;
}

.equipment-images img{
  width:200px;
  margin:10px;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,255,100,0.4);
}

.bottom-line{
  width:90%;
  height:1px;
  background:#00ff66;
  margin:40px auto 10px auto;
  box-shadow:0 0 8px #00ff66;
}

.footer-text{
  text-align:center;
  font-size:14px;
  margin-bottom:20px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="page">

<h1 class="matrix-title">СТАТИСТИКА</h1>

<div class="main-tabs">
  <button class="tab active" onclick="switchTab('stats', event)">Статистика</button>
  <button class="tab" onclick="switchTab('equipment', event)">Оборудование</button>
</div>

<!-- СТАТИСТИКА -->
<div id="statsPage">

<div class="buttons">
  <button class="mode" onclick="loadTable('damage',event)">Урон</button>
  <button class="mode" onclick="loadTable('damage_received',event)">Получено</button>
  <button class="mode" onclick="loadTable('hits',event)">Попадания</button>
  <button class="mode" onclick="loadTable('assist',event)">Ассист</button>
  <button onclick="toggleAverage()">Среднее</button>
</div>

<div class="date-buttons" id="dateButtons"></div>

<div id="tableWrapper">
  <div id="table"></div>
</div>

</div>

<!-- ОБОРУДОВАНИЕ -->
<div id="equipmentPage" style="display:none; text-align:center;">

  <div class="equip-buttons">
    <button onclick="loadEquipment('orso')">Orso</button>
    <button onclick="loadEquipment('setup2')">Setup 2</button>
  </div>

  <div id="equipmentContent"></div>

</div>

<div class="bottom-line"></div>
<div class="footer-text">Created by McQueen</div>

</div>

<script src="script.js"></script>
</body>
</html>
