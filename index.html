<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Статистика</title>

<style>
body{
  background:#000;
  color:white;
  margin:0;
  font-family:Arial;
  overflow-x:auto;
}

/* MATRIX */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* PAGE */
.page{
  position:relative;
  z-index:1;
  padding-top:10px;
}

/* TITLE */
.matrix-title{
  text-align:center;
  font-size:60px;
  color:#00ff66;
  text-shadow:0 0 20px #00ff66;
  margin-bottom:5px;
}

/* BUTTONS */
.buttons{
  text-align:center;
  margin-bottom:10px;
}

.date-buttons{
  text-align:center;
  margin-bottom:10px;
}

button{
  background:#2b2b2b;
  color:#fff;
  border:1px solid #444;
  padding:6px 12px;
  margin:4px;
  border-radius:6px;
  cursor:pointer;
}

button.active{background:#4a6ed1;}
.date-buttons button.active{background:#00aa55;}

/* TABLE */
#tableWrapper{
  width:100%;
  overflow-x:auto;
}

table{
  border-collapse:collapse;
  background:#1a1a1a;
  width:max-content;
  min-width:100%;
  table-layout:fixed;
}

th, td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
  transition:0.15s;
}

/* НИКИ фикс */
th:first-child, td:first-child{
  width:180px;
  min-width:180px;
  max-width:180px;
}

/* HOVER */
tr.hover-row td{
  background: rgba(255,255,255,0.05);
}

td.hover-col, th.hover-col{
  background: rgba(255,255,255,0.05);
}

td.hover-cell{
  background: rgba(255,255,255,0.12);
}

/* RESULT */
.win{background:#2e5e2e;}
.lose{background:#5e2e2e;}

.alive{color:#00ff66; font-weight:bold;}
.dead{color:#ff4444; font-weight:bold;}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="page">

<h1 class="matrix-title">СТАТИСТИКА</h1>

<div class="buttons">
  <button class="mode" onclick="loadTable('damage',event)">Урон</button>
  <button class="mode" onclick="loadTable('damage_received',event)">Получено</button>
  <button class="mode" onclick="loadTable('hits',event)">Попадания</button>
  <button class="mode" onclick="loadTable('assist',event)">Ассист</button>
  <button onclick="toggleAverage()">Среднее</button>
</div>

<div class="date-buttons" id="dateButtons"></div>

<div id="tableWrapper">
  <div id="table"></div>
</div>

</div>

<script src="tables.js"></script>

<script>
/* MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const letters="アイウエオ1234567890";
const chars=letters.split("");

const fontSize=16;
const columns=Math.floor(canvas.width/fontSize);

let drops=Array(columns).fill(1);

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.1)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#00ff66";
  ctx.font=fontSize+"px monospace";

  drops.forEach((y,i)=>{
    let text=chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(text,i*fontSize,y*fontSize);
    if(y*fontSize>canvas.height && Math.random()>0.97) drops[i]=0;
    drops[i]++;
  });
}

setInterval(draw,40);

window.addEventListener("resize", ()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});
</script>

</body>
</html>
